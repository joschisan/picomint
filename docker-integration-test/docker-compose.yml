services:
  bitcoind:
    image: ruimarinho/bitcoin-core:latest
    container_name: picomint-bitcoind
    command:
      - -regtest=1
      - -rpcuser=bitcoin
      - -rpcpassword=bitcoin
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18443
      - -fallbackfee=0.0004
      - -txindex=1
      - -server=1
    ports:
      - "18443:18443"
    volumes:
      - bitcoind_data:/home/bitcoin/.bitcoin

  miner:
    image: ruimarinho/bitcoin-core:latest
    container_name: picomint-miner
    depends_on:
      - bitcoind
    entrypoint: ["/bin/sh", "/miner.sh"]
    volumes:
      - ./miner.sh:/miner.sh:ro

  guardian-0-0: &guardian
    image: ghcr.io/joschisan/picomint-guardian-daemon:main
    container_name: picomint-guardian-daemon-0-0
    depends_on:
      - bitcoind
    environment: &guardian_env
      DATA_DIR: /data
      BITCOIN_NETWORK: regtest
      BITCOIND_URL: http://bitcoin:bitcoin@bitcoind:18443
      P2P_ADDR: 0.0.0.0:8080
      UI_ADDR: 0.0.0.0:3000
      RUST_LOG: info
    ports:
      - "3000:3000"
    volumes:
      - guardian_0_0_data:/data

  guardian-0-1:
    <<: *guardian
    container_name: picomint-guardian-daemon-0-1
    environment:
      <<: *guardian_env
    ports:
      - "3001:3000"
    volumes:
      - guardian_0_1_data:/data

  guardian-0-2:
    <<: *guardian
    container_name: picomint-guardian-daemon-0-2
    environment:
      <<: *guardian_env
    ports:
      - "3002:3000"
    volumes:
      - guardian_0_2_data:/data

  guardian-0-3:
    <<: *guardian
    container_name: picomint-guardian-daemon-0-3
    environment:
      <<: *guardian_env
    ports:
      - "3003:3000"
    volumes:
      - guardian_0_3_data:/data

  guardian-1-0:
    <<: *guardian
    container_name: picomint-guardian-daemon-1-0
    environment:
      <<: *guardian_env
    ports:
      - "3010:3000"
    volumes:
      - guardian_1_0_data:/data

  guardian-1-1:
    <<: *guardian
    container_name: picomint-guardian-daemon-1-1
    environment:
      <<: *guardian_env
    ports:
      - "3011:3000"
    volumes:
      - guardian_1_1_data:/data

  guardian-1-2:
    <<: *guardian
    container_name: picomint-guardian-daemon-1-2
    environment:
      <<: *guardian_env
    ports:
      - "3012:3000"
    volumes:
      - guardian_1_2_data:/data

  guardian-1-3:
    <<: *guardian
    container_name: picomint-guardian-daemon-1-3
    environment:
      <<: *guardian_env
    ports:
      - "3013:3000"
    volumes:
      - guardian_1_3_data:/data

  gateway:
    image: ghcr.io/joschisan/picomint-gateway:main
    container_name: picomint-gateway-daemon
    depends_on:
      - bitcoind
    environment:
      DATA_DIR: /data
      BITCOIN_NETWORK: regtest
      BITCOIND_URL: http://bitcoin:bitcoin@bitcoind:18443
      API_ADDR: 0.0.0.0:8080
      LDK_ADDR: 0.0.0.0:9735
      RUST_LOG: info
    ports:
      - "8090:8080"
      - "9735:9735"
    volumes:
      - gateway_data:/data

  recurringd:
    image: ghcr.io/joschisan/picomint-recurring:main
    container_name: picomint-recurringd
    environment:
      API_ADDR: 0.0.0.0:8080
      RUST_LOG: info
    ports:
      - "8091:8080"

volumes:
  bitcoind_data:
  guardian_0_0_data:
  guardian_0_1_data:
  guardian_0_2_data:
  guardian_0_3_data:
  guardian_1_0_data:
  guardian_1_1_data:
  guardian_1_2_data:
  guardian_1_3_data:
  gateway_data:
