services:
  picomint-gateway-daemon:
    image: ghcr.io/joschisan/picomint-gateway-daemon:main
    container_name: picomint-gateway-daemon
    restart: unless-stopped
    ports:
      # Public API
      - "8080:8080"
      # LDK lightning P2P (BOLT default port)
      - "9735:9735"
    volumes:
      - picomint_gateway_data:/data
    environment:
      - DATA_DIR=/data
      - ESPLORA_URL=https://mempool.space/api

volumes:
  picomint_gateway_data:
