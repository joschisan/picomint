name: StartOS s9pk

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        uses: start9labs/shared-workflows/.github/actions/free-disk-space@master

      - name: Setup build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Initialize developer signing key
        run: start-cli init-key
        shell: bash

      - name: Build TypeScript bundle
        working-directory: picomint-startos
        run: |
          npm ci
          npm run check
          npm run build

      - name: Build x86_64 .s9pk
        working-directory: picomint-startos
        run: make x86
        env:
          RUST_LOG: debug
          RUST_BACKTRACE: 1

      - name: Show s9pk metadata
        working-directory: picomint-startos
        run: |
          for f in *.s9pk; do
            echo "===== $f ====="
            start-cli s9pk inspect "$f" manifest | jq .
            sha256sum "$f"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: picomint-s9pk
          path: picomint-startos/*.s9pk
          retention-days: 14
          compression-level: 0
