name: Flaker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: picomint

    - name: Prebuild workspace
      run: cargo build --workspace --release

    - name: Make test script executable
      run: chmod +x test-integration.sh

    - name: Loop integration tests for 50 iterations
      run: |
        set -uo pipefail
        mkdir -p /tmp/flake-artifact
        LOG=/tmp/flake-artifact/iter.log
        extract_dir() {
          grep -oE 'Test data directory: .+' "$LOG" | tail -1 | sed 's/^Test data directory: //'
        }
        for i in $(seq 1 50); do
          START=$(date +%s)
          if ! timeout 300 ./test-integration.sh >"$LOG" 2>&1; then
            echo "=== iteration $i FAILED after $(($(date +%s) - START))s ==="
            cat "$LOG"
            DIR=$(extract_dir)
            if [ -n "$DIR" ] && [ -d "$DIR" ]; then
              echo "Archiving failing temp dir: $DIR"
              tar -czf /tmp/flake-artifact/temp-dir.tar.gz \
                -C "$(dirname "$DIR")" "$(basename "$DIR")" || true
            fi
            exit 1
          fi
          echo "iteration $i passed in $(($(date +%s) - START))s"
          # Reclaim disk from the passing iteration's temp dir.
          DIR=$(extract_dir)
          [ -n "$DIR" ] && [ -d "$DIR" ] && rm -rf "$DIR"
        done
        echo "All 50 iterations passed."

    - name: Upload flake artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: flake-artifact
        path: /tmp/flake-artifact
        if-no-files-found: warn
