name: Flaker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: picomint

    - name: Prebuild workspace
      run: cargo build --workspace

    - name: Make test script executable
      run: chmod +x test-integration.sh

    - name: Loop integration tests until failure or deadline
      run: |
        set -u
        DEADLINE=$(($(date +%s) + 10800))  # 3h
        i=0
        while [ "$(date +%s)" -lt "$DEADLINE" ]; do
          i=$((i + 1))
          echo "=== iteration $i ==="
          if ! timeout 600 ./test-integration.sh; then
            echo "FAILED on iteration $i"
            exit 1
          fi
        done
        echo "Completed $i iterations within budget."
