services:
  picomint-guardian-daemon:
    image: ghcr.io/joschisan/picomint-guardian-daemon:main
    container_name: picomint-guardian-daemon
    restart: unless-stopped
    depends_on:
      - bitcoind
    ports:
      # Iroh endpoint
      - "8080:8080"
      # Web UI — bound to host loopback only. Open <http://127.0.0.1:3000>
      # locally, or `ssh -NL 3000:127.0.0.1:3000 <host>` from another machine.
      - "127.0.0.1:3000:3000"
    volumes:
      - picomint_guardian_data:/data
    environment:
      - DATA_DIR=/data
      # Bitcoin backend — toggle which line is commented to switch between
      # the local pruned bitcoind service and a remote esplora instance.
      # - ESPLORA_URL=https://mempool.space/api
      - BITCOIND_URL=http://bitcoin:bitcoin@bitcoind:8332
      - UI_ADDR=0.0.0.0:3000

  bitcoind:
    image: btcpayserver/bitcoin:31.0
    container_name: picomint-bitcoind
    restart: unless-stopped
    volumes:
      - bitcoind_data:/data
    command:
      - bitcoind
      - -datadir=/data
      - -server=1
      - -prune=10000
      - -rpcbind=0.0.0.0
      - -rpcallowip=172.16.0.0/12
      - -rpcuser=bitcoin
      - -rpcpassword=bitcoin
      - -dbcache=1024

  dozzle:
    image: amir20/dozzle:latest
    container_name: picomint-dozzle
    restart: unless-stopped
    ports:
      # Browser log viewer — bound to host loopback only. Open
      # <http://127.0.0.1:3001> locally, or
      # `ssh -NL 3001:127.0.0.1:3001 <host>` from another machine.
      - "127.0.0.1:3001:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_NO_ANALYTICS=true

volumes:
  picomint_guardian_data:
  bitcoind_data:
