services:
  bitcoind:
    image: lncm/bitcoind:v28.0
    container_name: picomint-bitcoind
    restart: unless-stopped
    volumes:
      - bitcoind_data:/data/.bitcoin
    command:
      - -datadir=/data/.bitcoin
      - -server=1
      - -prune=10000
      - -rpcbind=0.0.0.0
      - -rpcallowip=172.16.0.0/12
      - -rpcuser=bitcoin
      - -rpcpassword=bitcoin
      - -dbcache=1024

  picomint-guardian-daemon:
    image: ghcr.io/joschisan/picomint-guardian-daemon:main
    container_name: picomint-guardian-daemon
    restart: unless-stopped
    depends_on:
      - bitcoind
    ports:
      # Iroh endpoint
      - "8080:8080"
      # Web UI — bound to host loopback only. Open <http://127.0.0.1:3000>
      # locally, or `ssh -NL 3000:127.0.0.1:3000 <host>` from another machine.
      - "127.0.0.1:3000:3000"
    volumes:
      - picomint_guardian_data:/data
    environment:
      - DATA_DIR=/data
      # - ESPLORA_URL=https://mempool.space/api
      - BITCOIND_URL=http://bitcoin:bitcoin@bitcoind:8332
      - UI_ADDR=0.0.0.0:3000

volumes:
  bitcoind_data:
  picomint_guardian_data:
